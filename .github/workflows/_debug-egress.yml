# Workflow diagnostico temporaneo (vedi scripts/_debug_egress.py) — da
# rimuovere insieme allo script a diagnosi conclusa. Trigger su push a
# questo branch specifico per poterlo lanciare senza gh CLI autenticato.
name: Debug egress WAF

on:
  push:
    branches:
      - debug/egress-waf-diagnosi
      - feat/E3-province-palermo-trapani

jobs:
  debug-egress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Diagnosi egress
        run: python scripts/_debug_egress.py
