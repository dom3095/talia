# CI TALIA — lint + test su ogni push/PR (TAL-2). Budget zero: GitHub Actions free tier.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      # Tesseract serve ai test OCR (oggi skippati se assenti, ma il runner è pronto).
      - name: Installa Tesseract (lingua ita)
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr tesseract-ocr-ita

      - name: Installa il pacchetto
        run: pip install -e '.[dev]'

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest -q

  cve-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Installa Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Scansione CVE (fallisce solo su CRITICAL)
        run: grype dir:. --fail-on critical

